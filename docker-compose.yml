version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    # No ports exposed to host; backend reaches it via internal network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - CODEBASE_PATH=/app/codebase/gnucobol
    depends_on:
      - qdrant
    volumes:
      - ./codebase:/app/codebase
    restart: unless-stopped

volumes:
  qdrant_data:
